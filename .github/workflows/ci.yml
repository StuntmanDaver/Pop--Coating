# .github/workflows/ci.yml
# Source: CONTEXT.md D-07/D-08; docs/DESIGN.md §9.1; 01-RESEARCH.md Pattern 6 (lines 481–524)
#
# CI pipeline: runs on every PR to main AND on pushes to main.
# Four merge gates (per D-08):
#   1. pnpm type-check  — TypeScript strict compilation
#   2. pnpm lint        — ESLint rules + madge --circular src/modules circular check
#   3. pnpm test        — Vitest unit tests
#   4. supabase test db — pgTAP RLS suite against the PR's Supabase branch DB (per D-07)
#   5. pnpm test:e2e — Playwright smoke tests when E2E credentials are configured
#
# D-07: pgTAP job waits for Supabase Preview branch DB before running.
#
# GitHub Actions env requirements are documented once in
# docs/runbooks/phase-1-production-readiness.md. Store values only in
# repo Settings -> Secrets and variables -> Actions; never commit values here.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: type-check + lint (+ madge circular check) + vitest
  # Runs on every PR and push to main.
  # ────────────────────────────────────────────────────────────────────────────
  type-check-lint-test:
    name: Type Check, Lint & Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript strict compilation
        run: pnpm type-check

      - name: ESLint + madge circular dependency check
        # pnpm lint runs: eslint src && pnpm madge:check
        # madge:check runs: madge --circular src/modules (skips if src/modules not yet created)
        run: pnpm lint

      - name: Vitest unit tests
        run: pnpm test

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: pgTAP RLS suite against the PR's Supabase branch DB
  # Runs only on pull_requests (D-07: branch DBs require a PR context).
  # Waits for Supabase Preview check (branch DB provisioning) before running.
  # ────────────────────────────────────────────────────────────────────────────
  pgtap:
    name: pgTAP RLS Suite (Branch DB)
    runs-on: ubuntu-latest
    needs: type-check-lint-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Wait for Supabase Preview branch DB
        # D-07: Each PR gets an isolated Supabase branch DB.
        # The Supabase GitHub App (installed on the repo) provisions the branch DB
        # and reports a "Supabase Preview" check. We wait up to 10 minutes for it.
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: wait-for-supabase
        with:
          checkName: Supabase Preview
          token: ${{ secrets.GITHUB_TOKEN }}
          timeoutSeconds: 600
          intervalSeconds: 15

      - name: Run pgTAP RLS suite against branch DB
        # supabase branches get returns JSON with connection details for the PR branch DB.
        # GitHub-hosted runners do not have IPv6 egress; prefer the session pooler.
        # supabase test db --db-url runs all SQL files in supabase/tests/ via pgTAP.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_BRANCH_NAME: ${{ github.head_ref }}
        run: |
          # `supabase branches get` dropped --format and now uses -o (json|env|toml|...).
          supabase branches get "$SUPABASE_BRANCH_NAME" \
            --project-ref "$SUPABASE_PROJECT_REF" \
            -o json > /tmp/supabase-branch.json

          # The transaction pooler on 6543 can leak pgTAP plan state across files,
          # so use the session pooler on 5432 when Supabase exposes POSTGRES_URL.
          SESSION_POOLER_URL="$(jq -r '.POSTGRES_URL // empty' /tmp/supabase-branch.json | sed -E 's/:6543\//:5432\//')"
          SUPABASE_DB_URL="${SESSION_POOLER_URL:-$(jq -r '.db_url // .POSTGRES_URL_NON_POOLING // empty' /tmp/supabase-branch.json)}"

          if [ -z "$SUPABASE_DB_URL" ] || [ "$SUPABASE_DB_URL" = "null" ]; then
            echo "Error: Could not retrieve branch DB URL from supabase branches get"
            exit 1
          fi

          supabase db push --db-url "$SUPABASE_DB_URL" --include-all --yes
          supabase test db --db-url "$SUPABASE_DB_URL"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Playwright E2E smoke suite
  # Runs only when staff test credentials are present. Missing credentials are a
  # clear skip, not a false pass for production readiness.
  # ────────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E Smoke
    runs-on: ubuntu-latest
    needs: type-check-lint-test
    env:
      E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
      E2E_STAFF_PASSWORD: ${{ secrets.E2E_STAFF_PASSWORD }}
      E2E_WORKSTATION_EMAIL: ${{ secrets.E2E_WORKSTATION_EMAIL }}
      E2E_WORKSTATION_PASSWORD: ${{ secrets.E2E_WORKSTATION_PASSWORD }}
      E2E_CUSTOMER_EMAIL: ${{ secrets.E2E_CUSTOMER_EMAIL }}
      E2E_RUN_MAGIC_LINK_POST: ${{ vars.E2E_RUN_MAGIC_LINK_POST }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_HOST: http://localhost:3000
      NEXT_PUBLIC_PORTAL_HOST: http://track.localhost:3000
      E2E_PORTAL_BASE_URL: http://track.localhost:3000

    steps:
      - name: Check E2E configuration
        id: e2e-config
        run: |
          if [ -z "$E2E_STAFF_EMAIL" ] || [ -z "$E2E_STAFF_PASSWORD" ]; then
            echo "Playwright E2E skipped: configure E2E_STAFF_EMAIL and E2E_STAFF_PASSWORD secrets."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "Playwright E2E skipped: configure NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY secrets."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.e2e-config.outputs.configured == 'true'
        uses: actions/checkout@v5

      - name: Setup pnpm
        if: steps.e2e-config.outputs.configured == 'true'
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        if: steps.e2e-config.outputs.configured == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.e2e-config.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.e2e-config.outputs.configured == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E
        if: steps.e2e-config.outputs.configured == 'true'
        run: pnpm test:e2e

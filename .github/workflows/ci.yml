# .github/workflows/ci.yml
# Source: CONTEXT.md D-07/D-08; docs/DESIGN.md §9.1; 01-RESEARCH.md Pattern 6 (lines 481–524)
#
# CI pipeline: runs on every PR to main AND on pushes to main.
# Four merge gates (per D-08):
#   1. pnpm type-check  — TypeScript strict compilation
#   2. pnpm lint        — ESLint rules + madge --circular src/modules circular check
#   3. pnpm test        — Vitest unit tests
#   4. supabase test db — pgTAP RLS suite against the PR's Supabase branch DB (per D-07)
#
# D-09: No Playwright E2E tests in Phase 1 CI.
# D-07: pgTAP job waits for Supabase Preview branch DB before running.
#
# Required GitHub secrets (set in repo Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — Supabase CLI token (Account → Access Tokens)
# Required GitHub variables:
#   SUPABASE_PROJECT_REF  — Supabase project reference ID (Project Settings → General)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: type-check + lint (+ madge circular check) + vitest
  # Runs on every PR and push to main.
  # ────────────────────────────────────────────────────────────────────────────
  type-check-lint-test:
    name: Type Check, Lint & Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript strict compilation
        run: pnpm type-check

      - name: ESLint + madge circular dependency check
        # pnpm lint runs: eslint src && pnpm madge:check
        # madge:check runs: madge --circular src/modules (skips if src/modules not yet created)
        run: pnpm lint

      - name: Vitest unit tests
        run: pnpm test

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: pgTAP RLS suite against the PR's Supabase branch DB
  # Runs only on pull_requests (D-07: branch DBs require a PR context).
  # Waits for Supabase Preview check (branch DB provisioning) before running.
  # ────────────────────────────────────────────────────────────────────────────
  pgtap:
    name: pgTAP RLS Suite (Branch DB)
    runs-on: ubuntu-latest
    needs: type-check-lint-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Ensure Supabase Preview branch DB
        # D-07: Each PR should run pgTAP against an isolated Supabase branch DB.
        # The Supabase GitHub App may provision this automatically, but do not
        # depend on that side-channel: create the preview branch on demand when
        # it is missing, then wait until the branch exposes db_url.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_BRANCH_NAME" ]; then
            echo "Error: github.head_ref is empty; this job only runs on pull_request."
            exit 1
          fi

          echo "Using Supabase preview branch: $SUPABASE_BRANCH_NAME"

          if ! supabase branches get "$SUPABASE_BRANCH_NAME" \
            --project-ref "$SUPABASE_PROJECT_REF" \
            -o json > /tmp/supabase-branch.json 2>/tmp/supabase-branch.err; then
            cat /tmp/supabase-branch.err
            echo "Preview branch not found; creating $SUPABASE_BRANCH_NAME"
            supabase branches create "$SUPABASE_BRANCH_NAME" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              -o json
          fi

          for attempt in $(seq 1 40); do
            supabase branches get "$SUPABASE_BRANCH_NAME" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              -o json > /tmp/supabase-branch.json

            SUPABASE_DB_URL="$(jq -r '.db_url // .POSTGRES_URL_NON_POOLING // .POSTGRES_URL // empty' /tmp/supabase-branch.json)"
            BRANCH_STATUS="$(jq -r '.preview_project_status // .status // "connection-info-ready"' /tmp/supabase-branch.json)"

            if [ -n "$SUPABASE_DB_URL" ]; then
              echo "Supabase preview branch ready with status: $BRANCH_STATUS"
              echo "SUPABASE_DB_URL=$SUPABASE_DB_URL" >> "$GITHUB_ENV"
              exit 0
            fi

            echo "Supabase preview branch not ready yet (attempt $attempt/40, status: ${BRANCH_STATUS:-unknown})"
            sleep 15
          done

          echo "Error: Supabase preview branch did not expose db_url in time"
          cat /tmp/supabase-branch.json
          exit 1

      - name: Run pgTAP RLS suite against branch DB
        # supabase branches get returns JSON with db_url for the PR's branch DB.
        # supabase test db --db-url runs all SQL files in supabase/tests/ via pgTAP.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_DB_URL" ] || [ "$SUPABASE_DB_URL" = "null" ]; then
            echo "Error: SUPABASE_DB_URL was not exported by the preview branch setup step"
            exit 1
          fi

          supabase db push --db-url "$SUPABASE_DB_URL" --include-all --yes
          supabase test db --db-url "$SUPABASE_DB_URL"

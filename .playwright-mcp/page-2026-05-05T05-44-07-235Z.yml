      - generic [ref=e30]:
        - paragraph [ref=e31]: ABOUT
        - heading "Pop's Industrial Coatings" [level=2] [ref=e32]
        - paragraph [ref=e33]: Pop's Industrial Coatings, a legacy defined by four generations of expertise in industrial coatings. With a rich history rooted in a deep understanding of the industry, we seamlessly blend tradition with a contemporary approach to applications, solidifying our position as a principal company in the industrial coating sector.
        - heading "Industrial Size Projects" [level=3] [ref=e34]
        - paragraph [ref=e35]: At Pop's Industrial Coatings, we take pride in our distinctive capabilities that set us apart in the industry. What makes us truly unique is our unparalleled capacity to handle substantial parts and heavy materials, making us your go-to solution for large-scale projects.
        - heading "Expansive Facilities" [level=3] [ref=e36]
        - paragraph [ref=e37]: Our expansive facilities empower us to seamlessly accommodate sizable jobs. With ample space at our disposal, we can efficiently manage and organize materials, ensuring a smooth workflow for even the most extensive projects.
      - generic [ref=e38]:
        - heading "Experience & Expertise" [level=3] [ref=e39]
        - paragraph [ref=e40]: Navigating the intricate landscape of coating systems requires expertise, and that's where we shine. Our team boasts extensive technical knowledge and know-how, particularly in dealing with complex coating systems. Whether it's a specialized application or a unique challenge, we have the skills to deliver top-notch results.
        - heading "Large Capacity Ovens" [level=3] [ref=e41]
        - paragraph [ref=e42]: Size matters, especially when it comes to powder coating. Our large capacity ovens are designed to accommodate large pieces effortlessly. This means that your substantial components receive the same meticulous attention and precision finish as smaller items.

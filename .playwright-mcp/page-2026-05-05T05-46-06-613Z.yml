        - paragraph [ref=e21]: VISITING US
        - heading "Guest Safety Rules" [level=1] [ref=e22]
        - paragraph [ref=e23]: Please read these rules carefully before entering our facility.
        - link "Check In" [ref=e25] [cursor=pointer]:
          - /url: /check-in
    - generic [ref=e28]:
      - generic [ref=e29]:
        - heading "Guest Safety Acknowledgment & Check-In Agreement" [level=2] [ref=e30]
        - paragraph [ref=e31]: Important Safety Notice
        - paragraph [ref=e32]: "You are entering an active industrial coating facility, including all parking and storage areas (the “Facility”). This “Facility” includes, but is not limited to:"
        - list [ref=e33]:
          - listitem [ref=e34]: Forklifts and heavy equipment
          - listitem [ref=e35]: Moving vehicles and overhead loads
          - listitem [ref=e36]: Steel, piping, structural components and material
          - listitem [ref=e37]: Industrial coatings, solvents, blasting media and airborne particulates
          - listitem [ref=e38]: Uneven surfaces and noise hazards
        - paragraph [ref=e39]: For your safety, strict adherence to the “Facility” rules is required at all times.
      - generic [ref=e40]:
        - paragraph [ref=e41]: Required Guest Safety Rules
        - paragraph [ref=e42]: "All guests, visitors, vendors and non-employees must comply with the following:"
        - list [ref=e43]:
          - listitem [ref=e44]:
            - text: Check In Required
            - list [ref=e45]:
              - listitem [ref=e46]: All guests must check in at shipping & receiving or the front office before entering the facility.
              - listitem [ref=e47]: You must remain with your designated Pop's Industrial Coatings escort at all times unless expressly authorized otherwise.
          - listitem [ref=e48]:
            - text: Personal Protective Equipment (PPE)
            - list [ref=e49]:
              - listitem [ref=e50]: Closed toe shoes are required at all times.
              - listitem [ref=e51]: Additional PPE (hard hat, safety glasses, hearing protection, high-visibility vest, respirator, etc.) must be worn if instructed.
              - listitem [ref=e52]: Failure to wear required PPE may result in removal from the facility.
          - listitem [ref=e53]:
            - text: Restricted Areas
            - list [ref=e54]:
              - listitem [ref=e55]: Do not enter production, blasting, coating or yard areas unless explicitly permitted.
              - listitem [ref=e56]: Never cross barriers, safety tape or warning signage.
          - listitem [ref=e57]:
            - text: Equipment & Vehicle Awareness
            - list [ref=e58]:
              - listitem [ref=e59]: Always remain alert for forklifts, cranes, trucks and moving equipment.
              - listitem [ref=e60]: Do not walk under suspended loads or approach operating machinery.
          - listitem [ref=e61]:
            - text: Conduct & Compliance
            - list [ref=e62]:
              - listitem [ref=e63]: Horseplay, distractions or unsafe behavior are not permitted.
              - listitem [ref=e64]: Follow all verbal and posted safety instructions immediately.
          - listitem [ref=e65]:
            - text: Injuries & Incidents
            - list [ref=e66]:
              - listitem [ref=e67]: Report all injuries, near misses or unsafe conditions immediately to a Pop's Industrial Coatings representative.
              - listitem [ref=e68]: Do not attempt to render aid beyond your training.
      - generic [ref=e69]:
        - paragraph [ref=e70]: Assumption of Risk
        - paragraph [ref=e71]: "By checking in or electronically acknowledging this notice, you confirm that:"
        - list [ref=e72]:
          - listitem [ref=e73]: You understand you are entering an industrial work environment with inherent risks.
          - listitem [ref=e74]: You agree to comply with all safety rules, instructions and PPE requirements.
          - listitem [ref=e75]: You voluntarily assume all risk of injury, death, illness or damage to your person or property arising out of or relating to your presence at the “Facility” whether such risk are known or unknown, foreseeable or unforeseeable and whether occurring during normal operations or otherwise, except to the extent caused by the gross negligence or willful misconduct of the owner. This assumption of risk is intended to be as broad and inclusive as permitted under Florida law.
          - listitem [ref=e76]: You agree that failure to follow safety requirements may result in immediate removal from the facility.
      - generic [ref=e77]:
        - paragraph [ref=e78]: Authorization to Enter
        - paragraph [ref=e79]: By checking in, I acknowledge that I have read, understand and agree to comply with all safety requirements while at the “Facility”.
      - link "Proceed to Check In" [ref=e81] [cursor=pointer]:
        - /url: /check-in

    - generic [ref=e29]:
      - generic [ref=e30]:
        - paragraph [ref=e31]: OUR STORY
        - heading "A legacy built over four generations" [level=2] [ref=e32]
        - paragraph [ref=e33]: Beginning with our founding generation in 1972, we embarked on a journey to master the art and science of industrial coatings. Over the years, this commitment has been passed down through four generations, each contributing to our legacy of excellence. Our history is not just a chronicle of time; it's a testament to our enduring passion for quality and innovation.
        - paragraph [ref=e34]: What sets us apart is our unwavering commitment to comprehending and fulfilling the unique needs of our clients. We view each project as an opportunity to exceed expectations, delivering workmanship and services of the highest quality. Our underlying objective is to establish widespread recognition as a provider of unparalleled services within the industry while ensuring timely delivery.
        - paragraph [ref=e35]: Dedicated to excellence, we actively promote open and participatory engagement across all aspects of our organization. Our team works collaboratively to achieve objectives and maintain the highest standards. We don't just view our clients as customers; we consider them partners in success. By fostering a culture of collaboration, we ensure that every project benefits from collective expertise and dedication.
        - paragraph [ref=e36]: At Pop's Industrial Coatings, our history is not just a story; it's a foundation upon which we continue to build a future. Join us in our journey, and let's create lasting success together.

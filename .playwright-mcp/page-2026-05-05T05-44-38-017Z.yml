        - generic [ref=e32]:
          - img "Mark Woods, former President of Pops Painting" [ref=e34]
          - generic [ref=e35]:
            - heading "Mark Woods" [level=3] [ref=e36]
            - paragraph [ref=e37]: President 1972 – 2025
            - paragraph [ref=e38]: Mark Woods, Former President of Pops Painting, proudly carried on the legacy of his father, Marcus Woods, as the second-generation leader of the company. With a career spanning over 53 years, Mark helped grow Pops Industrial Coatings from a small family business into a trusted name in the industrial painting and coatings industry. Respected for his strong work ethic and commitment to quality, Mark played a key role in the company's growth and reputation. Now retired, he remains a mentor and guiding influence for the next generation at Pops Industrial Coatings.
        - generic [ref=e39]:
          - img "Jamie Woods, President of Pop's Industrial Coatings" [ref=e41]
          - generic [ref=e42]:
            - heading "Jamie Woods" [level=3] [ref=e43]
            - paragraph [ref=e44]: President
            - paragraph [ref=e45]: Jamie Woods, President of Pops Industrial Coatings leads with over 30 years of expertise in the industrial painting and coatings industry. Known for his hands on leadership and deep technical knowledge, Jamie oversees all aspects of company operations, from project execution to long term strategic planning. Under his leadership, Pops has continued to grow its reputation for safety, quality, and reliability across a wide range of industrial sectors. He is committed to delivering high performance coating solutions that protect critical infrastructure and exceed client expectations.
            - link "LinkedIn" [ref=e46] [cursor=pointer]:
              - /url: https://www.linkedin.com/in/jamie-woods-95b0782a7/
              - generic [ref=e47]: →
              - generic [ref=e48]: LinkedIn
        - generic [ref=e49]:
          - img "Kaitlyn Woods, Associate Director of Operations and Compliance at Pop's Industrial Coatings" [ref=e51]
          - generic [ref=e52]:
            - heading "Kaitlyn Woods" [level=3] [ref=e53]
            - paragraph [ref=e54]: Associate Director of Operations and Compliance
            - paragraph [ref=e55]: Kaitlyn Woods, Associate Director of Operations and Compliance at Pops Industrial Coatings, represents the fourth generation. Having grown up around the business, she brings a deep understanding of its legacy and operations, playing a key role in managing executive support, client relations, and internal coordination to help drive the company's continued growth and reputation for excellence. Kaitlyn is passionate about preserving family tradition while embracing innovation, she is proud to contribute to the future of Pops Industrial Coatings.
            - link "LinkedIn" [ref=e56] [cursor=pointer]:
              - /url: https://www.linkedin.com/in/kaitlyn-woods-9214391a1/

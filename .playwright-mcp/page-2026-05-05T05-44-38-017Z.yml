          - generic [ref=e62]:
            - heading "Chris Woods Jr" [level=3] [ref=e63]
            - paragraph [ref=e64]: Fourth Generation
            - paragraph [ref=e65]: Chris Woods Jr. represents the fourth generation of the Woods family at Pops Industrial Coatings, carrying forward a proud legacy of craftsmanship and dedication. With a strong respect for the company's roots and a fresh perspective, Chris is committed to learning the business from the ground up and helping shape its future. He brings energy, drive, and a deep commitment to maintaining Pops' reputation for quality, safety, and service.
